fragment PageParts on Page {
  __typename
  title
  heroImage
  body
  blocks {
    __typename
    ... on PageBlocksHeading {
      text
    }
    ... on PageBlocksContent {
      body
    }
    ... on PageBlocksImage {
      url
      caption
      size
    }
    ... on PageBlocksCta {
      text
      link
    }
  }
}
